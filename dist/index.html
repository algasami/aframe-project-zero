<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A-Frame Project Zero</title>
    <meta name="description" content="A-Frame Project Zero" />
    <!-- This system was bundled using Webpack. If you want to inspect the source, you can find it in the 'src' directory. -->
    <!-- Alternatively, if you don't have the files, you can find them in my GitHub repository. -->
    <script src="./bundle.js"></script>
  </head>
  <body>
    <a-scene inspector fog="type: exponential; color: #AAAAAA; density: 0.15">
      <a-assets>
        <a-asset-item id="terrain" src="./assets/terrain.glb"></a-asset-item>
        <a-asset-item id="crow" src="./assets/crow.glb"></a-asset-item>
        <a-asset-item id="horse" src="./assets/horse.glb"></a-asset-item>
      </a-assets>
      <!-- Terrain -->
      <a-entity gltf-model="#terrain" position="0 0 0"></a-entity>
      <!-- Ground -->
      <a-plane
        position="0 0.3 0"
        rotation="-90 0 0"
        width="100"
        height="100"
        visible="false"
        static-body
      ></a-plane>
      <a-sky color="#220000"></a-sky>
      <!-- Terrain End -->
      <a-entity
        gltf-model="#crow"
        position="0.98 -0.9834 1.56032"
        disable-frustum-culling
        animation-mixer="loop: once; timeScale: 0.5; clampWhenFinished: true"
      ></a-entity>
      <a-entity gltf-model="#horse" animation-mixer></a-entity>
      <a-entity
        id="horse_trigger"
        position="0.50316 1.3842 -4.74658"
        spherical-trigger="radius: 2; target: #player_camera; triggerName: horse_trigger;"
      ></a-entity>
      <a-entity
        id="crow_trigger"
        position="-3.12726 1.3842 5.26084"
        spherical-trigger="radius: 3; target: #player_camera; triggerName: crow_trigger"
      ></a-entity>
      <a-entity
        id="player_camera"
        camera
        wasd-controls="acceleration: 10"
        look-controls="pointerLockEnabled: true"
        rotation="0 0 0"
        position="0 1.6 5"
        geometry="primitive: sphere; radius: 0.5;"
        static-body
      >
        <a-entity
          id="ui_text"
          ui-text="trigger_receiver: #player_camera;"
          rotation="0 0 0"
          position="0 0 -0.5"
          scale="0.8 0.8 0.8"
          text="value: ;"
        ></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
