<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A-Frame Project Zero</title>
    <meta name="description" content="A-Frame Project Zero" />
    <!-- This system was bundled using Webpack. If you want to inspect the source, you can find it in the 'src' directory. -->
    <!-- Alternatively, if you don't have the files, you can find them in my GitHub repository. -->
    <script src="./bundle.js"></script>
  </head>
  <body>
    <a-scene
      inspector
      physics="debug: true"
      fog="type: exponential; color: #AAAAAA; density: 0.05"
    >
      <a-assets>
        <a-asset-item id="terrain" src="./assets/terrain.glb"></a-asset-item>
      </a-assets>
      <!-- Terrain -->
      <a-entity gltf-model="#terrain" position="0 0 0"></a-entity>
      <!-- Ground -->
      <a-plane
        position="0 0.3 0"
        rotation="-90 0 0"
        width="100"
        height="100"
        visible="false"
        static-body
      ></a-plane>
      <a-sky color="#220000"></a-sky>
      <!-- Terrain End -->
      <a-sphere
        position="0 5 -5"
        radius="1.25"
        color="#EF2D5E"
        dynamic-body
      ></a-sphere>

      <a-entity
        id="camera"
        visible="false"
        camera
        wasd-controls="acceleration: 10"
        look-controls="pointerLockEnabled: true"
        position="0 1.6 0"
        geometry="primitive: sphere; radius: 0.5;"
        static-body
      ></a-entity>
    </a-scene>
  </body>
</html>
